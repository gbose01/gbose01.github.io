---
layout: default
title: Blog
---

<section class="section">
    <h2>Blog</h2>
    
    <ul class="post-list">
    {% for post in site.posts %}
        <li>
            <span class="post-date">{{ post.date | date: "%B %-d, %Y" }}</span>
            <a href="{{ post.url }}">{{ post.title }}</a>
        </li>
    {% endfor %}
    </ul>
</section>
